services:
  directus-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: directus-change-me
      POSTGRES_DB: directus
    volumes:
      - directus-db:/var/lib/postgresql/data

  directus:
    image: directus/directus:11.11.0
    restart: unless-stopped
    ports:
      - '8055:8055'
    depends_on:
      - directus-db
    environment:
      KEY: change-me-to-a-long-random-string
      SECRET: change-me-to-another-long-random-string
      DB_CLIENT: pg
      DB_HOST: directus-db
      DB_PORT: 5432
      DB_DATABASE: directus
      DB_USER: directus
      DB_PASSWORD: directus-change-me
      ADMIN_EMAIL: admin@upthrive.solutions
      ADMIN_PASSWORD: change-me-now
      PUBLIC_URL: http://localhost:8055
    volumes:
      - directus-uploads:/directus/uploads
      - directus-extensions:/directus/extensions

volumes:
  directus-db:
  directus-uploads:
  directus-extensions:
